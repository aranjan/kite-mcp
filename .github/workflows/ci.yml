name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff pytest

      - name: Check syntax
        run: python -m py_compile src/kite_mcp/server.py && python -m py_compile src/kite_mcp/auth.py && python -m py_compile src/kite_mcp/cli.py

      - name: Lint with ruff
        run: ruff check src/

      - name: Verify imports
        run: |
          python -c "from kite_mcp.auth import load_credentials, automated_login, get_authenticated_kite"
          python -c "from kite_mcp.server import mcp, main"
          python -c "from kite_mcp.cli import login, status"

      - name: Run tests
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    needs: lint-and-check

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify package
        run: |
          pip install dist/*.whl
          kite-mcp --help || true
