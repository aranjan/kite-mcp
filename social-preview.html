<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(56, 126, 209, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56, 126, 209, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Ascending chart line in background */
  .chart-line {
    position: absolute;
    bottom: 80px;
    left: 0;
    right: 0;
    height: 300px;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .title {
    font-size: 72px;
    font-weight: 800;
    color: #F8FAFC;
    letter-spacing: -2px;
  }

  .tagline {
    font-size: 28px;
    color: #94A3B8;
    font-weight: 400;
    max-width: 800px;
    line-height: 1.4;
  }

  .badges {
    display: flex;
    gap: 16px;
    margin-top: 8px;
  }

  .badge {
    padding: 8px 20px;
    border-radius: 24px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .badge-blue {
    background: rgba(37, 99, 235, 0.2);
    color: #60A5FA;
    border: 1px solid rgba(37, 99, 235, 0.3);
  }

  .badge-green {
    background: rgba(34, 197, 94, 0.2);
    color: #4ADE80;
    border: 1px solid rgba(34, 197, 94, 0.3);
  }

  .badge-orange {
    background: rgba(249, 115, 22, 0.2);
    color: #FB923C;
    border: 1px solid rgba(249, 115, 22, 0.3);
  }

  .install {
    font-size: 20px;
    color: #64748B;
    font-family: 'SF Mono', 'Fira Code', monospace;
    background: rgba(255,255,255,0.05);
    padding: 10px 28px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .accent-dot {
    position: absolute;
    border-radius: 50%;
  }
  .dot1 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(37,99,235,0.15), transparent 70%); top: 40px; right: 100px; }
  .dot2 { width: 160px; height: 160px; background: radial-gradient(circle, rgba(249,115,22,0.1), transparent 70%); bottom: 60px; left: 80px; }
</style>
</head>
<body>
  <div class="accent-dot dot1"></div>
  <div class="accent-dot dot2"></div>

  <svg class="chart-line" viewBox="0 0 1280 300" preserveAspectRatio="none">
    <path d="M 0 280 L 160 250 L 320 260 L 480 200 L 640 220 L 800 150 L 960 120 L 1120 70 L 1280 40"
          fill="none" stroke="rgba(34,197,94,0.12)" stroke-width="2"/>
    <path d="M 0 280 L 160 250 L 320 260 L 480 200 L 640 220 L 800 150 L 960 120 L 1120 70 L 1280 40 L 1280 300 L 0 300 Z"
          fill="url(#chartFill)"/>
    <defs>
      <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(34,197,94,0.08)"/>
        <stop offset="100%" stop-color="rgba(34,197,94,0)"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="content">
    <div class="title">kite-mcp</div>
    <div class="tagline">Trade Indian stocks on Zerodha through natural conversation with any AI assistant</div>
    <div class="badges">
      <span class="badge badge-blue">14 Trading Tools</span>
      <span class="badge badge-green">Auto TOTP Login</span>
      <span class="badge badge-orange">MCP Protocol</span>
    </div>
    <div class="install">pip install kite-mcp</div>
  </div>
</body>
</html>
