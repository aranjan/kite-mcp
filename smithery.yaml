# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio

configSchema:
  type: object
  required:
    - kiteApiKey
    - kiteApiSecret
    - kiteUserId
    - kitePassword
  properties:
    kiteApiKey:
      type: string
      title: "Kite API Key"
      description: "Your Kite Connect API key from developers.kite.trade"
    kiteApiSecret:
      type: string
      title: "Kite API Secret"
      description: "Your Kite Connect API secret from developers.kite.trade"
    kiteUserId:
      type: string
      title: "Zerodha User ID"
      description: "Your Zerodha client ID (e.g., AB1234)"
    kitePassword:
      type: string
      title: "Zerodha Password"
      description: "Your Zerodha login password"
    kiteTotpSecret:
      type: string
      title: "TOTP Secret (Optional)"
      description: "Base32 TOTP seed for fully automated login. Get this by switching to an external authenticator app in Zerodha security settings. Without this, you must run kite-mcp-login manually each day."
      default: ""

commandFunction:
  |-
    (config) => ({ command: 'kite-mcp', args: [], env: { KITE_API_KEY: config.kiteApiKey, KITE_API_SECRET: config.kiteApiSecret, KITE_USER_ID: config.kiteUserId, KITE_PASSWORD: config.kitePassword, KITE_TOTP_SECRET: config.kiteTotpSecret || '' } })
